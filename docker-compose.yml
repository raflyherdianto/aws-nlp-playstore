services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/raflyherdianto/aws-nlp-playstore:latest
    container_name: nlp_playstore
    restart: always
    ports:
      - "5000:5000"
    networks:
      - shared-network
    volumes:
      - ./uploads:/app/uploads # Persistensi sementara untuk CSV & Model
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
      - NLTK_DATA=/root/nltk_data
      - SECRET_KEY=${SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1536M   # t4g.medium has 4 GB — leave room for CF tunnel + OS
          cpus: '1.5'      # t4g.medium has 2 vCPU — reserve 0.5 for OS
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Mencegah log memenuhi disk
        max-file: "3"

networks:
  shared-network:
    external: true